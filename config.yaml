input_file: ${INPUT_FILE:-}
input_path: ${INPUT_PATH:-./input/}
output_path: ${OUTPUT_PATH:-./output/}
split_input_file: ${SPLIT_INPUT_FILE:-}
split_output_path: ${SPLIT_OUTPUT_PATH:-./output/}
rename_input_path: ${RENAME_INPUT_PATH:-./output/}
approval_form_input_path: ${APPROVAL_FORM_INPUT_PATH:-./output/}
approval_form_prefix: ${APPROVAL_FORM_PREFIX:-审批单_}
approval_form_excel_path: ${APPROVAL_FORM_EXCEL_PATH:-}
png_ocr_input_path: ${PNG_OCR_INPUT_PATH:-./input/}
png_ocr_output_txt_path: ${PNG_OCR_OUTPUT_TXT_PATH:-./output/png_ocr_regex_matches.txt}
# OCR 配置
ocr:
  use_gpu: ${OCR_USE_GPU:-true}
  gpu_mem: ${OCR_GPU_MEM:-8000}
  use_angle_cls: ${OCR_USE_ANGLE_CLS:-true}
  lang: ${OCR_LANG:-ch}
  det_limit_side_len: ${OCR_DET_LIMIT_SIDE_LEN:-2500} # 增加检测范围，提高 OCR 准确率
  # 切分配置
  split_keywords:
    - "附件1"
    - "北京北辰会展投资有限公司"
    - "设计变更审批表"
    # - "设计变更通知单"
  not_split_keywords:
    - "旧编号"

regex_pattern:
  # 主体
  # - "^190643GC-([a-zA-Z0-9]{4})-(\\d{1})"
  # - "^(\\d{2})-(\\d{2})-(C2)-(\\d{3})-(C|E)"
  
  #  B24
  - "^(JZ)-(\\d{2})-(\\d{2})-(C2)-(\\d{3})"
  - "^(\\d{2})-(\\d{2})-(C2)-(\\d{3})"
  - "^R20-03-Z-(\\d{2})"
  - "^泳池变更-(\\d{2})"
  - "^251614GC-([a-zA-Z0-9]{4})-(\\d{1})"
